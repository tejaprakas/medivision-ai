version: '3.9'

services:
  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medivision-backend
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://mongo:27017/medivision
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DEBUG=false
      - CORS_ORIGINS=http://localhost:3000,http://frontend:3000
    depends_on:
      - mongo
      - redis
    volumes:
      - ./uploads:/app/uploads
      - ./model_cache:/app/model_cache
    restart: unless-stopped
    networks:
      - medivision-network

  # Next.js Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medivision-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - medivision-network

  # MongoDB
  mongo:
    image: mongo:7.0
    container_name: medivision-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped
    networks:
      - medivision-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: medivision-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - medivision-network

volumes:
  mongo-data:
  redis-data:

networks:
  medivision-network:
    driver: bridge
